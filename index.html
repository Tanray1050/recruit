<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:#ffffff;overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);padding:0.85rem 2.5rem;display:flex;align-items:center;border-bottom:1px solid rgba(0,0,0,0.06);}
.nav-logo{font-family:'Noto Serif JP',serif;font-size:1rem;font-weight:900;color:#0a0a0a;letter-spacing:2px;}
.nav-logo span{color:#c0392b;}

.hero{
  min-height:calc(100vh - 72px);
  position:relative;
  display:flex;align-items:center;
  overflow:hidden;
  background:#ffffff;
}

canvas#mg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
}

.hero-inner{
  position:relative;z-index:10;
  max-width:960px;margin:0 auto;
  padding:6rem 2.5rem 3rem;
}

h1{
  font-family:'Noto Serif JP',serif;
  font-size:clamp(2.4rem,6vw,4.4rem);
  font-weight:900;color:#0a0a0a;
  line-height:1.2;margin-bottom:1.8rem;
  letter-spacing:2px;
}
h1 em{
  color:#1565c0;font-style:normal;display:block;
  position:relative;
}
h1 em::after{
  content:'';position:absolute;
  bottom:-6px;left:0;
  width:100%;height:3px;
  background:linear-gradient(90deg,#1565c0,#42a5f5,transparent);
}

.hero-desc{font-size:1rem;color:#546e7a;line-height:1.95;max-width:480px;margin-bottom:3rem;}

.hero-btns{display:flex;gap:16px;flex-wrap:wrap;}

.btn-graduate,
.btn-midcareer{
  display:flex;flex-direction:column;align-items:center;
  background:#5c7a9e;color:white;
  padding:18px 44px;border-radius:4px;border:none;cursor:pointer;
  transition:transform .2s,box-shadow .2s,background .2s;
  font-family:'Noto Sans JP',sans-serif;
}
.btn-graduate:hover,
.btn-midcareer:hover{
  background:#1565c0;
  transform:translateY(-3px);
  box-shadow:0 12px 32px rgba(92,122,158,0.4);
}
.btn-graduate .btn-label,
.btn-midcareer .btn-label{font-size:9px;font-weight:700;letter-spacing:3px;opacity:0.75;margin-bottom:3px;}
.btn-graduate .btn-main-text,
.btn-midcareer .btn-main-text{font-size:1.5rem;font-weight:900;letter-spacing:2px;}
.btn-graduate .btn-sub,
.btn-midcareer .btn-sub{font-size:0.68rem;opacity:0.75;margin-top:4px;letter-spacing:0.5px;}

footer{background:#0a0a0a;color:rgba(255,255,255,0.4);text-align:center;padding:2rem;font-size:0.78rem;letter-spacing:1px;}
footer strong{color:white;font-family:'Noto Serif JP',serif;font-size:0.95rem;}
</style>
</head>

<script>
const canvas = document.getElementById('mg');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== 大きな回転幾何学リング =====
class GeoRing {
  constructor() { this.reset(); }
  reset() {
    this.cx = Math.random() * canvas.width;
    this.cy = Math.random() * canvas.height;
    this.r = Math.random() * 300 + 200;
    this.sides = Math.floor(Math.random() * 3) + 3;
    this.angle = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() * 0.004 + 0.001) * (Math.random() > 0.5 ? 1 : -1);
    this.alpha = Math.random() * 0.06 + 0.02;
    this.strokeW = Math.random() * 1.2 + 0.5;
    this.color = Math.random() > 0.5 ? '#1565c0' : '#90caf9';
    this.scaleT = Math.random() * Math.PI * 2;
    this.scaleSpeed = Math.random() * 0.008 + 0.003;
    this.vx = (Math.random() - 0.5) * 0.06;
    this.vy = (Math.random() - 0.5) * 0.06;
  }
  update() {
    this.angle += this.rotSpeed;
    this.scaleT += this.scaleSpeed;
    this.cx += this.vx;
    this.cy += this.vy;
    if (this.cx < -this.r - 100) this.cx = canvas.width + this.r;
    if (this.cx > canvas.width + this.r + 100) this.cx = -this.r;
    if (this.cy < -this.r - 100) this.cy = canvas.height + this.r;
    if (this.cy > canvas.height + this.r + 100) this.cy = -this.r;
  }
  draw() {
    const scale = 1 + Math.sin(this.scaleT) * 0.08;
    const r = this.r * scale;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.strokeW;
    ctx.beginPath();
    for (let i = 0; i <= this.sides; i++) {
      const a = this.angle + (i / this.sides) * Math.PI * 2;
      const x = this.cx + Math.cos(a) * r;
      const y = this.cy + Math.sin(a) * r;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.restore();
  }
}

const geoRings = [];
for (let i = 0; i < 10; i++) geoRings.push(new GeoRing());

// ===== 流れる円弧 =====
class Arc {
  constructor() { this.reset(); }
  reset() {
    this.cx = Math.random() * canvas.width;
    this.cy = Math.random() * canvas.height;
    this.r = Math.random() * 220 + 60;
    this.startAngle = Math.random() * Math.PI * 2;
    this.span = Math.random() * Math.PI * 0.9 + 0.2;
    this.speed = (Math.random() * 0.006 + 0.002) * (Math.random() > 0.5 ? 1 : -1);
    this.alpha = Math.random() * 0.07 + 0.01;
    this.width = Math.random() * 1.2 + 0.3;
    this.color = Math.random() > 0.6 ? '#1565c0' : '#bbdefb';
    this.vx = (Math.random() - 0.5) * 0.1;
    this.vy = (Math.random() - 0.5) * 0.1;
    this.alphaT = Math.random() * Math.PI * 2;
    this.alphaSpeed = Math.random() * 0.02 + 0.005;
  }
  update() {
    this.startAngle += this.speed;
    this.cx += this.vx;
    this.cy += this.vy;
    this.alphaT += this.alphaSpeed;
  }
  draw() {
    const a = this.alpha + Math.sin(this.alphaT) * 0.03;
    ctx.save();
    ctx.globalAlpha = Math.max(0, a);
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.width;
    ctx.beginPath();
    ctx.arc(this.cx, this.cy, this.r, this.startAngle, this.startAngle + this.span);
    ctx.stroke();
    ctx.restore();
  }
}

const arcs = [];
for (let i = 0; i < 16; i++) arcs.push(new Arc());

// ===== 流れる斜めライン =====
class Line {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = init ? Math.random() * canvas.width * 1.5 - canvas.width * 0.5 : -200;
    this.y = Math.random() * canvas.height;
    this.len = Math.random() * 150 + 50;
    this.speed = Math.random() * 1.2 + 0.4;
    this.alpha = Math.random() * 0.06 + 0.01;
    this.width = Math.random() * 0.8 + 0.2;
    this.angle = (Math.random() - 0.5) * 0.4;
    this.color = Math.random() > 0.8 ? '#e8a000' : '#1565c0';
    this.alphaT = Math.random() * Math.PI * 2;
  }
  update() {
    this.x += this.speed;
    this.alphaT += 0.03;
    if (this.x > canvas.width + 200) this.reset(false);
  }
  draw() {
    const a = this.alpha * (0.7 + Math.sin(this.alphaT) * 0.3);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.width;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + this.len, this.y + Math.sin(this.angle) * this.len);
    ctx.stroke();
    ctx.restore();
  }
}

const lines = [];
for (let i = 0; i < 24; i++) lines.push(new Line());

// ===== 波紋 =====
class Ripple {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.r = 0;
    this.maxR = Math.random() * 200 + 80;
    this.speed = Math.random() * 1.2 + 0.5;
    this.alpha = Math.random() * 0.08 + 0.02;
    this.color = Math.random() > 0.5 ? '#1565c0' : '#e8a000';
  }
  update() {
    this.r += this.speed;
    if (this.r > this.maxR) this.reset();
  }
  draw() {
    const life = this.r / this.maxR;
    const a = this.alpha * (1 - life);
    ctx.save();
    ctx.globalAlpha = Math.max(0, a);
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

const ripples = [];
for (let i = 0; i < 6; i++) {
  const rp = new Ripple();
  rp.r = Math.random() * rp.maxR;
  ripples.push(rp);
}

// ===== 浮遊する大きな円 =====
class FloatCircle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.r = Math.random() * 200 + 80;
    this.vx = (Math.random() - 0.5) * 0.12;
    this.vy = (Math.random() - 0.5) * 0.12;
    this.fillAlpha = Math.random() * 0.025 + 0.005;
    this.strokeAlpha = Math.random() * 0.04 + 0.01;
    this.color = Math.random() > 0.5 ? '#1565c0' : '#e3f2fd';
    this.pulseT = Math.random() * Math.PI * 2;
    this.pulseSpeed = Math.random() * 0.01 + 0.003;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.pulseT += this.pulseSpeed;
    if (this.x < -this.r * 2) this.x = canvas.width + this.r;
    if (this.x > canvas.width + this.r * 2) this.x = -this.r;
    if (this.y < -this.r * 2) this.y = canvas.height + this.r;
    if (this.y > canvas.height + this.r * 2) this.y = -this.r;
  }
  draw() {
    const r = this.r + Math.sin(this.pulseT) * 8;
    ctx.save();
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.globalAlpha = this.fillAlpha;
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.globalAlpha = this.strokeAlpha;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 0.6;
    ctx.stroke();
    ctx.restore();
  }
}

const floats = [];
for (let i = 0; i < 8; i++) floats.push(new FloatCircle());

// ===== アニメーションループ =====
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  floats.forEach(f => { f.update(); f.draw(); });
  arcs.forEach(a => { a.update(); a.draw(); });
  geoRings.forEach(g => { g.update(); g.draw(); });
  lines.forEach(l => { l.update(); l.draw(); });
  ripples.forEach(r => { r.update(); r.draw(); });

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
